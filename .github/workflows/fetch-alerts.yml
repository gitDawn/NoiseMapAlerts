name: Fetch Alert Data

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch last 3 days of alerts from Pikud HaOref
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          COOKIES=$(mktemp)

          # Seed session cookies from main site
          curl -s -c "$COOKIES" -b "$COOKIES" \
            -H "User-Agent: $UA" \
            "https://www.oref.org.il/" -o /dev/null

          ALL_ALERTS="["
          FIRST=1
          for i in 2 1 0; do
            DS=$(date -d "-${i} days" '+%d.%m.%Y')
            URL="https://alerts-history.oref.org.il/Shared/Ajax/GetAlarmsHistory.aspx?lang=he&fromDate=${DS}&toDate=${DS}&mode=0"
            RESULT=$(curl -s -c "$COOKIES" -b "$COOKIES" \
              -H "User-Agent: $UA" \
              -H "Referer: https://www.oref.org.il/" \
              -H "X-Requested-With: XMLHttpRequest" \
              -H "Accept: application/json, text/javascript, */*; q=0.01" \
              "$URL")
            echo "$DS: $(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d),'alerts')" 2>/dev/null || echo 'error')"
            # Append items (strip outer brackets and join)
            ITEMS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(','.join(json.dumps(x,ensure_ascii=False) for x in d))" 2>/dev/null || echo "")
            if [ -n "$ITEMS" ]; then
              [ $FIRST -eq 0 ] && ALL_ALERTS="${ALL_ALERTS},"
              ALL_ALERTS="${ALL_ALERTS}${ITEMS}"
              FIRST=0
            fi
          done
          ALL_ALERTS="${ALL_ALERTS}]"
          echo "$ALL_ALERTS" > alerts.json
          echo "Total: $(echo "$ALL_ALERTS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)),'alerts')")"

      - name: Commit updated alerts.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add alerts.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update alerts data [skip ci]" && git push)
