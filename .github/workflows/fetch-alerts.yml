name: Fetch Alert Data

on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Fetch last 3 days of alerts from Pikud HaOref
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          import json, datetime

          alerts = []
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
              )
              page = context.new_page()

              # Visit main page so Cloudflare sets cookies/fingerprint
              page.goto('https://www.oref.org.il/', wait_until='domcontentloaded', timeout=30000)

              for i in range(2, -1, -1):
                  d = datetime.date.today() - datetime.timedelta(days=i)
                  ds = d.strftime('%d.%m.%Y')
                  url = (
                      'https://alerts-history.oref.org.il/Shared/Ajax/GetAlarmsHistory.aspx'
                      f'?lang=he&fromDate={ds}&toDate={ds}&mode=0'
                  )
                  try:
                      # Run fetch() inside the browser's JS context (inherits CF cookies)
                      body = page.evaluate(f"""
                          async () => {{
                              const r = await fetch("{url}", {{
                                  headers: {{
                                      'Referer': 'https://www.oref.org.il/',
                                      'X-Requested-With': 'XMLHttpRequest',
                                      'Accept': 'application/json'
                                  }}
                              }});
                              return await r.text();
                          }}
                      """)
                      data = json.loads(body)
                      if isinstance(data, list):
                          alerts.extend(data)
                          print(f'{ds}: {len(data)} alerts')
                      else:
                          print(f'{ds}: unexpected — {str(body)[:100]}')
                  except Exception as e:
                      print(f'Error {ds}: {e}')

              browser.close()

          with open('alerts.json', 'w', encoding='utf-8') as f:
              json.dump(alerts, f, ensure_ascii=False, separators=(',', ':'))
          print(f'Total: {len(alerts)} alerts saved.')
          EOF

      - name: Commit updated alerts.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add alerts.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update alerts data [skip ci]" && git push)
